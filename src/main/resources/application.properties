spring.application.name=flyway

# Configuraçăo datasource Oracle
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:XE
spring.datasource.username=project
spring.datasource.password=final
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Configuraçăo Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
#util caso o banco ja existir
spring.flyway.baseline-on-migrate=true
#impede migraçőes fora de ordem
spring.flyway.out-of-order=false
#valida se năo houver alteraçőes manuais
spring.flyway.validate-on-migrate=true
